<!DOCTYPE html>
<html>
<head>
    <title>Edit Entry</title>
    <link rel="stylesheet" type="text/css" href="css/style.css">
</head>
<body>

<div class="container">
    <h2>Edit Entry</h2>

    <form id="editForm">
        <label>Username:</label>
        <input type="text" name="username" id="username" required><br>
        <label>Email:</label>
        <input type="email" name="email" id="email" required><br>
        <button type="submit">Update</button>
        <button type="button" id="deleteBtn">Delete</button>
    </form>

</div>

<a href="index.html">Back to Dashboard</a><br><br>
<a href="user_list.html">Back to User List</a><br><br>
<a href="Registration_form.html">Back to Registration Form</a>

<script>
const apiUrl = "https://mini-backend-1-wv48.onrender.com/api/users/";
const token = localStorage.getItem("token");
if(!token) window.location.href = "login_form.html";

const urlParams = new URLSearchParams(window.location.search);
const userId = urlParams.get('id');
if(!userId){
    alert("No user ID provided");
    window.location.href = "user_list.html";
}

async function loadUser(){
    const res = await fetch(apiUrl + userId + "/", {
        headers: { "Authorization": "Bearer " + token }
    });
    const user = await res.json();
    document.getElementById("username").value = user.username;
    document.getElementById("email").value = user.email;
}

loadUser();

document.getElementById("editForm").addEventListener("submit", async (e)=>{
    e.preventDefault();
    const username = document.getElementById("username").value;
    const email = document.getElementById("email").value;

    const res = await fetch(apiUrl + userId + "/", {
        method: "PUT",
        headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + token
        },
        body: JSON.stringify({ username, email })
    });

    if(res.ok){
        alert("User updated!");
        window.location.href = "user_list.html";
    } else {
        const err = await res.json();
        alert("Update failed: " + JSON.stringify(err));
    }
});

document.getElementById("deleteBtn").addEventListener("click", async ()=>{
    if(confirm("Are you sure you want to delete this user?")){
        const res = await fetch(apiUrl + userId + "/", {
            method: "DELETE",
            headers: { "Authorization": "Bearer " + token }
        });
        if(res.ok){
            alert("User deleted!");
            window.location.href = "user_list.html";
        } else {
            const err = await res.json();
            alert("Delete failed: " + JSON.stringify(err));
        }
    }
});
</script>
</body>
</html>
